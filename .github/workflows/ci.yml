name: CI

# CI runs on every push to main and every pull request targeting main.
# Goal: zero-regression policy on the cryptographic core. If the build
# breaks or any test fails, the PR is blocked.
#
# Note: macOS-26 runners (the host where we discovered the CryptoKit
# AES.GCM.open SIGTRAP bug — see issue #1) are not yet available on
# GitHub-hosted runners. CI runs on macOS-15 / macOS-14, where the
# bug does not manifest. The three XCTSkip'd tests are therefore
# *also* skipped in CI for consistency. When macOS-26 runners become
# available we will pin to one and verify the skips were correct.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS ${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: '15'
            runner: macos-15
          - os: '14'
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swift --version

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build --verbose

      - name: Test
        run: swift test --enable-code-coverage

  documents-check:
    name: Verify required documents are present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required documents must exist
        run: |
          set -e
          required=(
            MISSION.md
            THREAT-MODEL.md
            GOVERNANCE.md
            ALGORITHM-SUBMISSION.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            CLA.md
            CONTRIBUTORS.md
            LICENSE
            README.md
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::missing required file: $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required files are missing — refusing to merge."
            exit 1
          fi
          echo "All $((${#required[@]})) required documents present."

  canary-recency:
    name: Warrant canary must be current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Most recent canary is at most 60 days old
        run: |
          set -e
          newest=$(ls -1 canary/*.txt 2>/dev/null | sort | tail -n 1 || true)
          if [ -z "$newest" ]; then
            echo "::error::no canary file found in canary/"
            exit 1
          fi
          # Extract YYYY-MM from the filename like canary/2026-04.txt
          base=$(basename "$newest" .txt)
          year=${base%-*}
          month=${base#*-}
          # Treat the canary as "published on the 1st of that month".
          canary_epoch=$(date -d "${year}-${month}-01" +%s 2>/dev/null || gdate -d "${year}-${month}-01" +%s 2>/dev/null || true)
          if [ -z "$canary_epoch" ]; then
            # Fallback if neither GNU date nor gdate is present (it is
            # on ubuntu-latest, just being defensive).
            echo "::warning::could not parse canary date, skipping age check"
            exit 0
          fi
          now_epoch=$(date +%s)
          age_days=$(( (now_epoch - canary_epoch) / 86400 ))
          echo "Most recent canary: $base (age: ${age_days} days)"
          if [ "$age_days" -gt 60 ]; then
            echo "::error::canary is ${age_days} days old; threshold is 60. Publish a new monthly canary."
            exit 1
          fi
