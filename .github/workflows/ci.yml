name: CI

# CI runs on every push to main and every pull request targeting main.
# Goal: zero-regression policy on the cryptographic core. If the build
# breaks or any test fails, the PR is blocked.
#
# As of v0.0.3 (Sprint 2), Aegis depends on Apple's native post-quantum
# CryptoKit primitives (MLKEM768, XWingMLKEM768X25519, MLDSA65,
# SecureEnclave.MLKEM768), which are gated `@available(iOS 26.0,
# macOS 26.0, ...)`. Package.swift therefore declares iOS 26 / macOS 26
# minimums, and CI must run on macOS-26 runners to satisfy them.
# This is also the host where the CryptoKit AES.GCM.open SIGTRAP
# bug (issue #1) was first observed; the three XCTSkip'd tests
# remain skipped on this runner until Apple ships a fix.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Run JavaScript-based actions (actions/checkout, actions/cache, ...)
# on Node.js 24. Node.js 20 is being removed from GitHub-hosted
# runners on 2026-09-16; opting in early avoids the deprecation
# warning surfaced on every run and gives us advance notice if any
# pinned action breaks under the new runtime. See issue #8.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel any in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS ${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: '26'
            runner: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swift --version

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Defence in depth for the KAT vectors: every file in
      # Tests/AegisCryptoTests/Vectors/ must have its SHA-256
      # documented in that directory's README.md, and every
      # SHA-256 in the README.md must correspond to a real file.
      # An unauthorised edit to a vector file (or a stale README
      # entry) blocks merge before tests run. See issue #7.
      - name: Verify Vectors/ SHA-256 checksums against README
        run: |
          set -e
          cd Tests/AegisCryptoTests/Vectors

          # Actual file checksums, sorted/uniqued.
          actual=$(ls | grep -v '^README\.md$' \
            | xargs -I{} shasum -a 256 {} \
            | awk '{print $1}' \
            | sort -u)

          # README-documented checksums (backtick-wrapped 64 hex chars).
          expected=$(grep -oE '`[0-9a-f]{64}`' README.md \
            | tr -d '`' \
            | sort -u)

          missing_in_readme=$(comm -23 <(echo "$actual") <(echo "$expected"))
          missing_files=$(comm -13 <(echo "$actual") <(echo "$expected"))

          fail=0
          if [ -n "$missing_in_readme" ]; then
            echo "::error::these file checksums are not documented in README.md:"
            echo "$missing_in_readme"
            fail=1
          fi
          if [ -n "$missing_files" ]; then
            echo "::error::these README.md checksums have no matching file:"
            echo "$missing_files"
            fail=1
          fi
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "All Vectors/ files match README.md checksums."

      - name: Build
        run: swift build --verbose

      - name: Test
        run: swift test --enable-code-coverage

  documents-check:
    name: Verify required documents are present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required documents must exist
        run: |
          set -e
          required=(
            MISSION.md
            THREAT-MODEL.md
            GOVERNANCE.md
            ALGORITHM-SUBMISSION.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            CLA.md
            CONTRIBUTORS.md
            LICENSE
            README.md
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::missing required file: $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required files are missing — refusing to merge."
            exit 1
          fi
          echo "All $((${#required[@]})) required documents present."

  canary-recency:
    name: Warrant canary must be current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Most recent canary is at most 60 days old
        run: |
          set -e
          newest=$(ls -1 canary/*.txt 2>/dev/null | sort | tail -n 1 || true)
          if [ -z "$newest" ]; then
            echo "::error::no canary file found in canary/"
            exit 1
          fi
          # Extract YYYY-MM from the filename like canary/2026-04.txt
          base=$(basename "$newest" .txt)
          year=${base%-*}
          month=${base#*-}
          # Treat the canary as "published on the 1st of that month".
          canary_epoch=$(date -d "${year}-${month}-01" +%s 2>/dev/null || gdate -d "${year}-${month}-01" +%s 2>/dev/null || true)
          if [ -z "$canary_epoch" ]; then
            # Fallback if neither GNU date nor gdate is present (it is
            # on ubuntu-latest, just being defensive).
            echo "::warning::could not parse canary date, skipping age check"
            exit 0
          fi
          now_epoch=$(date +%s)
          age_days=$(( (now_epoch - canary_epoch) / 86400 ))
          echo "Most recent canary: $base (age: ${age_days} days)"
          if [ "$age_days" -gt 60 ]; then
            echo "::error::canary is ${age_days} days old; threshold is 60. Publish a new monthly canary."
            exit 1
          fi
