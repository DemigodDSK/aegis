# XcodeGen specification for the Aegis iOS app target.
#
# This file is the source of truth for `Aegis.xcodeproj`. The
# .xcodeproj is regenerated by running `xcodegen` at the repo
# root; both this spec and the generated project are
# committed so contributors without xcodegen installed can
# still open the project in Xcode.
#
# Editing the .xcodeproj directly in Xcode WILL diverge from
# this spec. After such an edit, prefer to mirror the change
# into this file and re-run xcodegen rather than committing
# .pbxproj diffs.

name: Aegis

options:
  bundleIdPrefix: io.github.demigoddsk
  developmentLanguage: en
  deploymentTarget:
    iOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # Set in Xcode for personal/free signing

# Local SwiftPM package — AegisCrypto, AegisStorage, AegisApp.
packages:
  Aegis:
    path: "."

targets:
  Aegis:
    type: application
    platform: iOS
    deploymentTarget: "26.0"

    sources:
      - path: iOS/Sources
      - path: iOS/Resources
        type: folder

    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: Aegis
        CFBundleShortVersionString: "0.0.8"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Aegis uses encryption — exclusively via Apple's CryptoKit
        # (AES-GCM, X25519, ML-KEM, ML-DSA, HKDF, SHA, HMAC). All
        # algorithms are NIST/IETF-standard and on the export-
        # exempt list for binaries that ship system-bundled crypto
        # only. Setting this to false signals to App Store Connect
        # that no additional encryption-export disclosure is
        # required. If we ever vendor non-system crypto (we will
        # not without a Council-approved deviation in MISSION.md),
        # this needs to flip to true and a documentation export
        # form gets attached in App Store Connect.
        ITSAppUsesNonExemptEncryption: false

    entitlements:
      path: iOS/Aegis.entitlements
      properties:
        # Keychain access group — lets AegisStorage write items
        # under our team-prefixed access group rather than the
        # default. Sprint 9 networking will share this group with
        # any extension targets we add (notification service,
        # etc.).
        keychain-access-groups:
          - "$(AppIdentifierPrefix)io.github.demigoddsk.Aegis"
        # Push-notification capability provisioned, not yet
        # consumed. Sprint 9 networking wires up the consumer.
        # `development` for now; flip to `production` only after
        # the App Store Connect record is created and a
        # production push key is generated. Phase B work.
        aps-environment: development

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.demigoddsk.Aegis
        PRODUCT_NAME: Aegis
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone (1) + iPad (2)
        SWIFT_OBJC_BRIDGING_HEADER: ""
        SUPPORTS_MACCATALYST: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Strict concurrency to match the rest of the codebase.
        SWIFT_STRICT_CONCURRENCY: complete
        # No bitcode — Apple deprecated it in Xcode 14.
        ENABLE_BITCODE: NO

    dependencies:
      - package: Aegis
        product: AegisApp
      - package: Aegis
        product: AegisCrypto
      - package: Aegis
        product: AegisStorage

schemes:
  Aegis:
    build:
      targets:
        Aegis: all
    run:
      config: Debug
    archive:
      config: Release
